<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" style="font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="rgba(50,50,93,0.25)" />
      <feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="rgba(0,0,0,0.12)" />
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="browserClip">
      <rect x="60" y="20" width="780" height="540" rx="10" ry="10"/>
    </clipPath>
    <linearGradient id="navGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1c1e54"/>
      <stop offset="100%" style="stop-color:#16184a"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#533afd"/>
      <stop offset="100%" style="stop-color:#7c5cfc"/>
    </linearGradient>
  </defs>

  <!-- Browser window shadow -->
  <rect x="60" y="20" width="780" height="540" rx="10" fill="rgba(50,50,93,0.15)" transform="translate(0,8)"/>

  <!-- Browser chrome -->
  <rect x="60" y="20" width="780" height="540" rx="10" fill="#1e1e2e" filter="url(#shadow)"/>

  <!-- Title bar -->
  <rect x="60" y="20" width="780" height="44" rx="10" fill="#2d2d3f"/>
  <rect x="60" y="44" width="780" height="20" fill="#2d2d3f"/>

  <!-- Traffic lights -->
  <circle cx="96" cy="42" r="7" fill="#ff5f57"/>
  <circle cx="118" cy="42" r="7" fill="#febc2e"/>
  <circle cx="140" cy="42" r="7" fill="#28c840"/>

  <!-- URL bar -->
  <rect x="260" y="29" width="380" height="26" rx="5" fill="rgba(255,255,255,0.08)"/>
  <text x="450" y="47" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="12">localhost:3000/invoices/new</text>

  <!-- Page content area -->
  <rect x="60" y="64" width="780" height="496" fill="#f4f7fb" clip-path="url(#browserClip)"/>

  <!-- === TOP NAV === -->
  <rect x="60" y="64" width="780" height="50" fill="url(#navGrad)"/>

  <!-- Logo icon -->
  <rect x="84" y="78" width="22" height="22" rx="5" fill="#533afd"/>
  <rect x="88" y="83" width="14" height="3" rx="1.5" fill="white"/>
  <rect x="88" y="88.5" width="9" height="2.5" rx="1.25" fill="rgba(255,255,255,0.6)"/>
  <rect x="88" y="93" width="11" height="2.5" rx="1.25" fill="rgba(255,255,255,0.6)"/>

  <!-- Logo text -->
  <text x="112" y="94" fill="white" font-size="14" font-weight="600" letter-spacing="-0.3">InvoiceGen</text>

  <!-- Nav links -->
  <text x="680" y="94" fill="rgba(255,255,255,0.65)" font-size="13">Dashboard</text>
  <text x="756" y="94" fill="rgba(255,255,255,0.65)" font-size="13">Invoices</text>

  <!-- New Invoice button in nav -->
  <rect x="812" y="76" width="100" height="28" rx="4" fill="#533afd">
    <animate attributeName="opacity" values="1;0.85;1" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <text x="862" y="95" text-anchor="middle" fill="white" font-size="12" font-weight="500">+ New Invoice</text>

  <!-- === PAGE CONTENT === -->
  <!-- Back link -->
  <text x="84" y="137" fill="#64748d" font-size="12">← Invoices</text>

  <!-- Page title -->
  <text x="84" y="165" fill="#061b31" font-size="26" font-weight="300" letter-spacing="-0.5">New Invoice</text>
  <text x="84" y="184" fill="#64748d" font-size="13">Fill in the details below to create a new invoice.</text>

  <!-- === CLIENT INFORMATION CARD === -->
  <rect x="84" y="198" width="720" height="170" rx="6" fill="white" stroke="#e5edf5" stroke-width="1">
    <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="0.2s"/>
  </rect>

  <!-- Card heading -->
  <text x="108" y="222" fill="#061b31" font-size="13" font-weight="600">Client Information</text>
  <line x1="108" y1="230" x2="780" y2="230" stroke="#f0f4f8" stroke-width="1"/>

  <!-- Row 1: Client Name + Email -->
  <!-- Client Name field -->
  <text x="108" y="255" fill="#273951" font-size="11" font-weight="500">Client Name *</text>
  <rect x="108" y="260" width="320" height="32" rx="4" fill="white" stroke="#533afd" stroke-width="1.5"/>
  <text x="120" y="281" fill="#273951" font-size="12">Acme Corporation</text>

  <!-- Email field -->
  <text x="452" y="255" fill="#273951" font-size="11" font-weight="500">Email Address *</text>
  <rect x="452" y="260" width="316" height="32" rx="4" fill="white" stroke="#e5edf5" stroke-width="1"/>
  <text x="464" y="281" fill="#64748d" font-size="12">billing@acmecorp.com</text>

  <!-- Row 2: Company + Due Date -->
  <text x="108" y="313" fill="#273951" font-size="11" font-weight="500">Company</text>
  <rect x="108" y="318" width="320" height="32" rx="4" fill="white" stroke="#e5edf5" stroke-width="1"/>
  <text x="120" y="339" fill="#64748d" font-size="12">Acme Corp</text>

  <text x="452" y="313" fill="#273951" font-size="11" font-weight="500">Due Date *</text>
  <rect x="452" y="318" width="316" height="32" rx="4" fill="white" stroke="#e5edf5" stroke-width="1"/>
  <text x="464" y="339" fill="#273951" font-size="12">2026-05-15</text>

  <!-- === LINE ITEMS CARD === -->
  <rect x="84" y="380" width="720" height="185" rx="6" fill="white" stroke="#e5edf5" stroke-width="1">
    <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="0.4s"/>
  </rect>

  <text x="108" y="404" fill="#061b31" font-size="13" font-weight="600">Line Items</text>
  <line x1="108" y1="412" x2="780" y2="412" stroke="#f0f4f8" stroke-width="1"/>

  <!-- Column headers -->
  <text x="108" y="432" fill="#64748d" font-size="10" font-weight="600" letter-spacing="0.07em">DESCRIPTION</text>
  <text x="538" y="432" text-anchor="end" fill="#64748d" font-size="10" font-weight="600" letter-spacing="0.07em">QTY</text>
  <text x="638" y="432" text-anchor="end" fill="#64748d" font-size="10" font-weight="600" letter-spacing="0.07em">UNIT PRICE</text>
  <text x="760" y="432" text-anchor="end" fill="#64748d" font-size="10" font-weight="600" letter-spacing="0.07em">SUBTOTAL</text>

  <!-- Line item 1 -->
  <rect x="108" y="438" width="390" height="28" rx="4" fill="white" stroke="#e5edf5" stroke-width="1"/>
  <text x="120" y="457" fill="#273951" font-size="12">Product Design &amp; Prototyping</text>
  <rect x="504" y="438" width="62" height="28" rx="4" fill="white" stroke="#e5edf5" stroke-width="1"/>
  <text x="534" y="457" text-anchor="middle" fill="#273951" font-size="12">40</text>
  <rect x="572" y="438" width="88" height="28" rx="4" fill="white" stroke="#e5edf5" stroke-width="1"/>
  <text x="614" y="457" text-anchor="middle" fill="#273951" font-size="12">150.00</text>
  <text x="760" y="457" text-anchor="end" fill="#061b31" font-size="13" font-weight="500">$6,000.00</text>

  <!-- Line item 2 -->
  <rect x="108" y="474" width="390" height="28" rx="4" fill="white" stroke="#e5edf5" stroke-width="1"/>
  <text x="120" y="493" fill="#273951" font-size="12">Frontend Development</text>
  <rect x="504" y="474" width="62" height="28" rx="4" fill="white" stroke="#e5edf5" stroke-width="1"/>
  <text x="534" y="493" text-anchor="middle" fill="#273951" font-size="12">60</text>
  <rect x="572" y="474" width="88" height="28" rx="4" fill="white" stroke="#e5edf5" stroke-width="1"/>
  <text x="614" y="493" text-anchor="middle" fill="#273951" font-size="12">200.00</text>
  <text x="760" y="493" text-anchor="end" fill="#061b31" font-size="13" font-weight="500">$12,000.00</text>

  <!-- + Add line item -->
  <rect x="108" y="508" width="130" height="28" rx="4" fill="transparent" stroke="#b9b9f9" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="174" y="527" text-anchor="middle" fill="#533afd" font-size="12">+ Add line item</text>

  <!-- Total -->
  <line x1="630" y1="543" x2="780" y2="543" stroke="#e5edf5" stroke-width="1.5"/>
  <text x="670" y="558" fill="#64748d" font-size="12" font-weight="500">Total</text>
  <text x="780" y="558" text-anchor="end" fill="#061b31" font-size="22" font-weight="300" letter-spacing="-0.5">$18,000.00</text>

  <!-- Create Invoice button - glowing CTA -->
  <g filter="url(#glow)">
    <rect x="620" y="575" width="160" height="36" rx="4" fill="url(#brandGrad)">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="700" y="599" text-anchor="middle" fill="white" font-size="13" font-weight="500">Create Invoice</text>

</svg>
