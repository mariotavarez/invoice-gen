<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" style="font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="18" flood-color="rgba(50,50,93,0.22)"/>
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="rgba(0,0,0,0.10)"/>
    </filter>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="rgba(50,50,93,0.10)"/>
    </filter>
    <linearGradient id="navGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1c1e54"/>
      <stop offset="100%" style="stop-color:#16184a"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#533afd"/>
      <stop offset="100%" style="stop-color:#7c5cfc"/>
    </linearGradient>
    <clipPath id="browserClip">
      <rect x="50" y="18" width="800" height="510" rx="10"/>
    </clipPath>
  </defs>

  <!-- Browser shadow -->
  <rect x="50" y="26" width="800" height="510" rx="10" fill="rgba(50,50,93,0.12)"/>

  <!-- Browser frame -->
  <rect x="50" y="18" width="800" height="510" rx="10" fill="#1e1e2e" filter="url(#shadow)"/>

  <!-- Title bar -->
  <rect x="50" y="18" width="800" height="42" rx="10" fill="#2a2a3e"/>
  <rect x="50" y="40" width="800" height="20" fill="#2a2a3e"/>

  <!-- Traffic lights -->
  <circle cx="84" cy="39" r="6" fill="#ff5f57"/>
  <circle cx="104" cy="39" r="6" fill="#febc2e"/>
  <circle cx="124" cy="39" r="6" fill="#28c840"/>

  <!-- URL bar -->
  <rect x="260" y="27" width="380" height="24" rx="5" fill="rgba(255,255,255,0.07)"/>
  <text x="450" y="44" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="11">localhost:3000</text>

  <!-- Page background -->
  <rect x="50" y="60" width="800" height="468" fill="#f4f7fb" clip-path="url(#browserClip)"/>

  <!-- ── TOP NAV ── -->
  <rect x="50" y="60" width="800" height="48" fill="url(#navGrad)"/>

  <!-- Logo icon -->
  <rect x="72" y="73" width="20" height="20" rx="4" fill="#533afd"/>
  <rect x="76" y="77" width="12" height="2.5" rx="1.25" fill="white"/>
  <rect x="76" y="82" width="8" height="2" rx="1" fill="rgba(255,255,255,0.6)"/>
  <rect x="76" y="86" width="10" height="2" rx="1" fill="rgba(255,255,255,0.6)"/>
  <text x="98" y="88" fill="white" font-size="13" font-weight="600" letter-spacing="-0.3">InvoiceGen</text>

  <!-- Nav links -->
  <text x="636" y="89" fill="white" font-size="12" font-weight="500">Dashboard</text>
  <text x="712" y="89" fill="rgba(255,255,255,0.6)" font-size="12">Invoices</text>

  <!-- New Invoice button -->
  <rect x="770" y="72" width="58" height="26" rx="4" fill="#533afd"/>
  <text x="799" y="90" text-anchor="middle" fill="white" font-size="11" font-weight="500">+ New</text>

  <!-- ── KPI CARDS ── (fade in staggered) -->
  <!-- Card 1: Total Invoiced -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;1;1" keyTimes="0;0.08;0.18;0.6;0.9;1" dur="8s" repeatCount="indefinite"/>
    <rect x="72" y="128" width="174" height="86" rx="6" fill="white" filter="url(#cardShadow)"/>
    <text x="90" y="151" fill="#64748d" font-size="10" font-weight="600" letter-spacing="0.06em">TOTAL INVOICED</text>
    <text x="90" y="180" fill="#061b31" font-size="22" font-weight="300" letter-spacing="-0.5">$48,200</text>
    <text x="90" y="200" fill="#27a644" font-size="10">↑ 12% vs last month</text>
  </g>

  <!-- Card 2: Paid -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;0;1;1;1;1" keyTimes="0;0.08;0.14;0.22;0.6;0.9;1" dur="8s" repeatCount="indefinite"/>
    <rect x="258" y="128" width="174" height="86" rx="6" fill="white" filter="url(#cardShadow)"/>
    <text x="276" y="151" fill="#64748d" font-size="10" font-weight="600" letter-spacing="0.06em">PAID</text>
    <text x="276" y="180" fill="#061b31" font-size="22" font-weight="300" letter-spacing="-0.5">$33,400</text>
    <rect x="276" y="192" width="38" height="14" rx="7" fill="#d1fae5"/>
    <text x="295" y="203" text-anchor="middle" fill="#065f46" font-size="9" font-weight="600">8 inv</text>
  </g>

  <!-- Card 3: Outstanding -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;0;0;1;1;1;1" keyTimes="0;0.08;0.14;0.20;0.28;0.6;0.9;1" dur="8s" repeatCount="indefinite"/>
    <rect x="444" y="128" width="174" height="86" rx="6" fill="white" filter="url(#cardShadow)"/>
    <text x="462" y="151" fill="#64748d" font-size="10" font-weight="600" letter-spacing="0.06em">OUTSTANDING</text>
    <text x="462" y="180" fill="#061b31" font-size="22" font-weight="300" letter-spacing="-0.5">$12,400</text>
    <rect x="462" y="192" width="46" height="14" rx="7" fill="#fef3c7"/>
    <text x="485" y="203" text-anchor="middle" fill="#92400e" font-size="9" font-weight="600">3 inv</text>
  </g>

  <!-- Card 4: Drafts -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;0;0;0;1;1;1;1" keyTimes="0;0.08;0.14;0.20;0.26;0.34;0.6;0.9;1" dur="8s" repeatCount="indefinite"/>
    <rect x="630" y="128" width="142" height="86" rx="6" fill="white" filter="url(#cardShadow)"/>
    <text x="648" y="151" fill="#64748d" font-size="10" font-weight="600" letter-spacing="0.06em">DRAFTS</text>
    <text x="648" y="180" fill="#061b31" font-size="22" font-weight="300" letter-spacing="-0.5">2</text>
    <text x="648" y="200" fill="#94a3b8" font-size="10">not yet sent</text>
  </g>

  <!-- ── INVOICES TABLE ── -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;0;0;0;0;1;1;1" keyTimes="0;0.08;0.14;0.20;0.26;0.38;0.46;0.88;1" dur="8s" repeatCount="indefinite"/>
    <rect x="72" y="234" width="700" height="258" rx="6" fill="white" filter="url(#cardShadow)"/>

    <!-- Table header -->
    <rect x="72" y="234" width="700" height="36" rx="6" fill="white"/>
    <rect x="72" y="258" width="700" height="12" fill="white"/>
    <text x="92" y="258" fill="#64748d" font-size="10" font-weight="600" letter-spacing="0.07em">INVOICE</text>
    <text x="264" y="258" fill="#64748d" font-size="10" font-weight="600" letter-spacing="0.07em">CLIENT</text>
    <text x="432" y="258" fill="#64748d" font-size="10" font-weight="600" letter-spacing="0.07em">AMOUNT</text>
    <text x="546" y="258" fill="#64748d" font-size="10" font-weight="600" letter-spacing="0.07em">DUE DATE</text>
    <text x="666" y="258" fill="#64748d" font-size="10" font-weight="600" letter-spacing="0.07em">STATUS</text>

    <line x1="72" y1="265" x2="772" y2="265" stroke="#f0f4f8" stroke-width="1"/>

    <!-- Row 1 -->
    <text x="92" y="289" fill="#533afd" font-size="12" font-weight="500">INV-2026-0012</text>
    <text x="264" y="289" fill="#273951" font-size="12">Acme Corporation</text>
    <text x="432" y="289" fill="#061b31" font-size="12" font-weight="500">$18,000</text>
    <text x="546" y="289" fill="#64748d" font-size="12">May 15, 2026</text>
    <rect x="666" y="278" width="40" height="16" rx="8" fill="#d1fae5"/>
    <text x="686" y="290" text-anchor="middle" fill="#065f46" font-size="9" font-weight="700">PAID</text>

    <line x1="72" y1="299" x2="772" y2="299" stroke="#f8fafc" stroke-width="1"/>

    <!-- Row 2 -->
    <text x="92" y="323" fill="#533afd" font-size="12" font-weight="500">INV-2026-0011</text>
    <text x="264" y="323" fill="#273951" font-size="12">Bright Media Group</text>
    <text x="432" y="323" fill="#061b31" font-size="12" font-weight="500">$7,200</text>
    <text x="546" y="323" fill="#64748d" font-size="12">May 3, 2026</text>
    <rect x="666" y="312" width="40" height="16" rx="8" fill="#dbeafe"/>
    <text x="686" y="324" text-anchor="middle" fill="#1e40af" font-size="9" font-weight="700">SENT</text>

    <line x1="72" y1="333" x2="772" y2="333" stroke="#f8fafc" stroke-width="1"/>

    <!-- Row 3 -->
    <text x="92" y="357" fill="#533afd" font-size="12" font-weight="500">INV-2026-0010</text>
    <text x="264" y="357" fill="#273951" font-size="12">Vertex Solutions</text>
    <text x="432" y="357" fill="#061b31" font-size="12" font-weight="500">$5,200</text>
    <text x="546" y="357" fill="#64748d" font-size="12">Apr 28, 2026</text>

    <!-- Status badge that animates: Draft → Sent -->
    <g>
      <rect x="666" y="346" width="46" height="16" rx="8" fill="#f1f5f9">
        <animate attributeName="fill" values="#f1f5f9;#f1f5f9;#dbeafe;#dbeafe;#f1f5f9" keyTimes="0;0.5;0.6;0.9;1" dur="8s" repeatCount="indefinite"/>
      </rect>
      <text x="689" y="358" text-anchor="middle" fill="#64748d" font-size="9" font-weight="700">
        <animate attributeName="fill" values="#64748d;#64748d;#1e40af;#1e40af;#64748d" keyTimes="0;0.5;0.6;0.9;1" dur="8s" repeatCount="indefinite"/>
        DRAFT
        <set attributeName="display" to="none" begin="0s" dur="8s"/>
      </text>
      <!-- Draft text (shown first) -->
      <text x="689" y="358" text-anchor="middle" font-size="9" font-weight="700">
        <animate attributeName="fill" values="#64748d;#64748d;#1e40af;#1e40af;#64748d" keyTimes="0;0.5;0.6;0.9;1" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.52;0.58;0.95;1" dur="8s" repeatCount="indefinite"/>
        DRAFT
      </text>
      <!-- Sent text (fades in) -->
      <text x="689" y="358" text-anchor="middle" fill="#1e40af" font-size="9" font-weight="700">
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.52;0.58;0.95;1" dur="8s" repeatCount="indefinite"/>
        SENT
      </text>
    </g>

    <line x1="72" y1="367" x2="772" y2="367" stroke="#f8fafc" stroke-width="1"/>

    <!-- Row 4 -->
    <text x="92" y="391" fill="#533afd" font-size="12" font-weight="500">INV-2026-0009</text>
    <text x="264" y="391" fill="#273951" font-size="12">Nova Creative Studio</text>
    <text x="432" y="391" fill="#061b31" font-size="12" font-weight="500">$3,400</text>
    <text x="546" y="391" fill="#64748d" font-size="12">Apr 20, 2026</text>
    <rect x="666" y="380" width="40" height="16" rx="8" fill="#d1fae5"/>
    <text x="686" y="392" text-anchor="middle" fill="#065f46" font-size="9" font-weight="700">PAID</text>

    <line x1="72" y1="401" x2="772" y2="401" stroke="#f8fafc" stroke-width="1"/>

    <!-- Row 5 -->
    <text x="92" y="425" fill="#533afd" font-size="12" font-weight="500">INV-2026-0008</text>
    <text x="264" y="425" fill="#273951" font-size="12">Skyline Partners</text>
    <text x="432" y="425" fill="#061b31" font-size="12" font-weight="500">$8,600</text>
    <text x="546" y="425" fill="#64748d" font-size="12">Apr 12, 2026</text>
    <rect x="666" y="414" width="46" height="16" rx="8" fill="#fef3c7"/>
    <text x="689" y="426" text-anchor="middle" fill="#92400e" font-size="9" font-weight="700">OVERDUE</text>

    <line x1="72" y1="435" x2="772" y2="435" stroke="#f8fafc" stroke-width="1"/>

    <!-- Row 6 -->
    <text x="92" y="459" fill="#533afd" font-size="12" font-weight="500">INV-2026-0007</text>
    <text x="264" y="459" fill="#273951" font-size="12">Redwood Consulting</text>
    <text x="432" y="459" fill="#061b31" font-size="12" font-weight="500">$5,800</text>
    <text x="546" y="459" fill="#64748d" font-size="12">Apr 5, 2026</text>
    <rect x="666" y="448" width="40" height="16" rx="8" fill="#d1fae5"/>
    <text x="686" y="460" text-anchor="middle" fill="#065f46" font-size="9" font-weight="700">PAID</text>

    <!-- Footer -->
    <text x="92" y="486" fill="#94a3b8" font-size="11">Showing 6 of 12 invoices</text>
    <text x="752" y="486" text-anchor="end" fill="#533afd" font-size="11" font-weight="500">View all →</text>
  </g>

</svg>
